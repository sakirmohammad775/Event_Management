<nav class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">

        <!-- Logo -->
        <a href="{% url 'home' %}" class="text-xl font-bold text-purple-600 flex items-center gap-2">
            EventHub
        </a>

        <!-- Desktop Links -->
        <div class="hidden md:flex items-center gap-6 text-sm font-medium text-gray-600">
            <a href="{% url 'admin-dashboard' %}" class="hover:text-purple-600 transition">Dashboard</a>
            <a href="{% url 'event_list' %}" class="hover:text-purple-600 transition">Events</a>
            <a href="{% url 'participant-list' %}" class="hover:text-purple-600 transition">Participants</a>
            <a href="{% url 'group-list' %}" class="hover:text-purple-600 transition">Groups</a>
            <a href="{% url 'create-group' %}" class="hover:text-purple-600 transition">Create Group</a>
        </div>

        <!-- User + Logout -->
        <div class="hidden md:flex items-center gap-3">
            <a href="{% url 'profile' %}">
                <div
                    class="w-9 h-9 rounded-full overflow-hidden border border-gray-300 cursor-pointer hover:scale-105 transition">

                    {% if user.profile_picture %}
                    <img src="{{ user.profile_picture.url }}" alt="Profile" class="w-full h-full object-cover">
                    {% else %}
                    <div
                        class="w-9 h-9 rounded-full bg-green-500 flex items-center justify-center text-white font-bold text-sm cursor-pointer hover:scale-105 transition">
                        {{ user.username|first|upper }}
                    </div>
                    {% endif %}

                </div>
            </a>
            <span class="text-sm text-gray-500">{{ user.username }}</span>
            <form method="POST" action="{% url 'signout' %}">
                {% csrf_token %}
                <button type="submit" class="text-sm text-gray-400 hover:text-red-500 transition">Logout</button>
            </form>
        </div>

        <!-- Mobile button -->
        <button id="admin-menu-btn" class="md:hidden text-gray-600">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
    </div>

    <!-- Mobile Menu -->
    <div id="admin-mobile-menu" class="hidden md:hidden bg-white border-t px-4 py-4 space-y-3 text-sm text-gray-700">
        <a href="{% url 'admin-dashboard' %}" class="block hover:text-purple-600">Dashboard</a>
        <a href="{% url 'event_list' %}" class="block hover:text-purple-600">Events</a>
        <a href="{% url 'participant-list' %}" class="block hover:text-purple-600">Participants</a>
        <a href="{% url 'group-list' %}" class="block hover:text-purple-600">Groups</a>
        <a href="{% url 'create-group' %}" class="block hover:text-purple-600">Create Group</a>
        <form method="POST" action="{% url 'signout' %}">
            {% csrf_token %}
            <button type="submit" class="text-red-500 hover:text-red-700">Logout</button>
        </form>
    </div>
</nav>

<script>
    document.getElementById('admin-menu-btn').addEventListener('click', function () {
        document.getElementById('admin-mobile-menu').classList.toggle('hidden');
    });
</script>
