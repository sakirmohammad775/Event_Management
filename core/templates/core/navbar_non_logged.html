{% load static %}

<nav class="w-full bg-black/90 backdrop-blur-md text-white border-b border-white/10 fixed top-0 left-0 z-50">
    
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <div class="flex items-center justify-between h-20">
            
            <!-- Logo -->
            <div class="flex-shrink-0">
                <a href="{% url 'home' %}" class="text-2xl font-black tracking-tighter uppercase">
                    EVENTHUB<span class="text-[#f05555]">.</span>
                </a>
            </div>

            <!-- Desktop Menu -->
            <div class="hidden md:flex">
                <div class="ml-10 flex items-center space-x-8 uppercase text-[11px] font-bold tracking-widest">
                    
                    <a href="{% url 'home' %}" class="text-[#f05555]">Home</a>
                    <a href="#" class="hover:text-[#f05555] transition">Speakers</a>
                    <a href="#" class="hover:text-[#f05555] transition">Schedule</a>
                    <a href="#" class="hover:text-[#f05555] transition">Gallery</a>
                    <a href="#" class="hover:text-[#f05555] transition">Contact Us</a>
                    <a href="{% url 'signin' %}" class="hover:text-[#f05555] transition">Sign In</a>
                    <a href="{% url 'signup' %}" class="hover:text-[#f05555] transition">Sign Up</a>

                </div>
            </div>

            <!-- Mobile Button -->
            <div class="md:hidden flex items-center">
                <button id="menu-btn" class="text-white hover:text-[#f05555] transition">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 6h16M4 12h16m-7 6h7" />
                    </svg>
                </button>
            </div>

        </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden bg-black border-t border-white/10 px-6 py-6 space-y-4 text-sm uppercase font-bold tracking-widest">

        <a href="{% url 'home' %}" class="block text-[#f05555]">Home</a>
        <a href="#" class="block hover:text-[#f05555]">Speakers</a>
        <a href="#" class="block hover:text-[#f05555]">Schedule</a>
        <a href="#" class="block hover:text-[#f05555]">Gallery</a>
        <a href="#" class="block hover:text-[#f05555]">Price</a>
        <a href="#" class="block hover:text-[#f05555]">Contact Us</a>
        <a href="{% url 'signin' %}" class="block hover:text-[#f05555]">Sign In</a>
        <a href="{% url 'signup' %}" class="block hover:text-[#f05555]">Sign Up</a>

    </div>
</nav>

<!-- JS -->
<script>
    const btn = document.getElementById('menu-btn');
    const menu = document.getElementById('mobile-menu');

    btn.addEventListener('click', () => {
        menu.classList.toggle('hidden');
    });
</script>
