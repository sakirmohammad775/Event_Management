{% load static %}

<nav class="w-full bg-black/95 backdrop-blur-md text-white border-b border-white/10 fixed top-0 left-0 z-[100]">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-20">
            
            <div class="flex items-center gap-3">
                <a href="{% url 'home' %}" class="text-2xl font-black tracking-tighter uppercase">
                    EVENTHUB<span class="text-[#f05555]">.</span>
                </a>
                <span class="hidden sm:block text-[10px] font-bold bg-[#f05555] text-white px-2 py-0.5 rounded uppercase tracking-widest">
                    Organizer
                </span>
            </div>

            <div class="hidden lg:flex items-center">
                <div class="flex items-center space-x-8 uppercase text-[11px] font-bold tracking-widest">
                    <a href="{% url 'organizer_dashboard' %}" class="hover:text-[#f05555] transition-colors duration-300">Dashboard</a>
                    <a href="{% url 'event_list' %}" class="hover:text-[#f05555] transition-colors duration-300">Manage Events</a>
                    <a href="{% url 'category_list' %}" class="hover:text-[#f05555] transition-colors duration-300">Categories</a>
                    
                    <a href="{% url 'event_create' %}" class="bg-[#f05555] px-4 py-2 rounded text-white hover:bg-white hover:text-black transition-all">
                        + New Event
                    </a>

                    <div class="flex items-center gap-4 border-l border-white/20 pl-6 ml-2">
                        <a href="{% url 'profile' %}" class="flex items-center gap-2 group">
                            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-[#f05555] to-red-800 flex items-center justify-center text-white font-bold text-xs ring-2 ring-white/10 group-hover:ring-[#f05555] transition-all">
                                {{ user.username|first|upper }}
                            </div>
                            <span class="lowercase text-gray-400 group-hover:text-white transition-colors">@{{ user.username }}</span>
                        </a>
                        
                        <form method="POST" action="{% url 'signout' %}" class="inline">
                            {% csrf_token %}
                            <button type="submit" class="text-gray-500 hover:text-[#f05555] transition-colors uppercase text-[10px]">
                                Logout
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="lg:hidden flex items-center">
                <button id="org-menu-btn" class="text-white hover:text-[#f05555] transition-colors">
                    <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                    </svg>
                </button>
            </div>

        </div>
    </div>

    <div id="org-mobile-menu" class="hidden lg:hidden bg-black border-t border-white/10 px-6 py-8 space-y-6 text-sm uppercase font-bold tracking-widest shadow-2xl">
        <div class="flex items-center gap-3 mb-4 pb-4 border-b border-white/10">
            <div class="w-10 h-10 rounded-full bg-[#f05555] flex items-center justify-center text-white">
                {{ user.username|first|upper }}
            </div>
            <span class="text-white">Account: {{ user.username }}</span>
        </div>
        
        <a href="{% url 'organizer_dashboard' %}" class="block hover:text-[#f05555]">Dashboard</a>
        <a href="{% url 'event_list' %}" class="block hover:text-[#f05555]">Manage Events</a>
        <a href="{% url 'category_list' %}" class="block hover:text-[#f05555]">Categories</a>
        <a href="{% url 'event_create' %}" class="block text-[#f05555]">+ New Event</a>
        <a href="{% url 'profile' %}" class="block hover:text-[#f05555]">My Profile</a>
        
        <form method="POST" action="{% url 'signout' %}" class="pt-4 border-t border-white/10">
            {% csrf_token %}
            <button type="submit" class="text-red-500 hover:text-red-400">Logout</button>
        </form>
    </div>
</nav>

<script>
    const orgBtn = document.getElementById('org-menu-btn');
    const orgMenu = document.getElementById('org-mobile-menu');

    orgBtn.addEventListener('click', () => {
        orgMenu.classList.toggle('hidden');
    });
</script>
