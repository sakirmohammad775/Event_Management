{% extends 'core/base.html' %}
{% load static %}

{% block title %}Contact Us | EVENTHUB{% endblock %}

{% block content %}
<div class="pt-32 pb-20 px-6 max-w-2xl mx-auto">
    <div class="bg-black border border-white/10 p-10 md:p-16 rounded-[3rem] shadow-2xl">
        <h1 class="text-4xl font-black text-white uppercase tracking-tighter mb-2 italic">Get in Touch<span class="text-[#f05555]">.</span></h1>
        <p class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-10">We reply faster than a lightning strike</p>

        <form class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <input type="text" placeholder="YOUR NAME" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white text-xs font-bold focus:border-[#f05555] outline-none transition-all">
                <input type="email" placeholder="YOUR EMAIL" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white text-xs font-bold focus:border-[#f05555] outline-none transition-all">
            </div>
            <textarea placeholder="YOUR MESSAGE" rows="5" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white text-xs font-bold focus:border-[#f05555] outline-none transition-all"></textarea>
            
            <button type="submit" class="w-full py-5 bg-[#f05555] text-white text-[10px] font-black uppercase tracking-[0.3em] rounded-2xl hover:bg-white hover:text-black transition-all shadow-xl shadow-[#f05555]/20">
                Transmit Message
            </button>
        </form>
    </div>
</div>
{% endblock %}
